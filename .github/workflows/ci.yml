name: Python CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install psutil

    - name: Run Python file
      run:  python Task1_TodoList/todo.py
      run: python Task2_Calculator/calculator.py
      run: python Task3_PasswordGenerator/password.py
      run: python Task4_WeatherForecast/weather.py
      run: python Task5_QuizGame/quiz_game.py
